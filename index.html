<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SysViz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif']
          }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="./style.css">
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.152.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.152.0/examples/jsm/"
      }
    }
  </script>
</head>
<body class="font-sans bg-stone-50">
  <canvas id="cluster-canvas" aria-label="3D cluster canvas"></canvas>

  <script type="module">
    import { ClusterRenderer } from './js/rendering/ClusterRenderer.js';

    const canvas = document.getElementById('cluster-canvas');
    const renderer = new ClusterRenderer(canvas);

    renderer.start();
    window.clusterRenderer = renderer;
  </script>
</body>
</html>
